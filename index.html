<!DOCTYPE html>
<html>
<head>
    <title>IEEE UPNM - Multi-Node Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e1e1e1; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00ff88; text-transform: uppercase; margin-bottom: 10px; }
        
        .panel { background: #1c2128; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 20px; border: 1px solid #30363d; }
        .settings-input { background: #0b0e11; color: #00ff88; border: 1px solid #30363d; padding: 5px; border-radius: 4px; margin-left: 10px; }
        
        .section-header { color: #00ff88; font-size: 1.5em; text-align: left; width: 95%; max-width: 1100px; margin: 30px auto 10px auto; border-bottom: 2px solid #30363d; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        .dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; padding: 15px; min-width: 180px; flex: 1; }
        .label { font-size: 0.8em; color: #8b949e; text-transform: uppercase; }
        .value { font-size: 2em; font-weight: bold; color: #ffffff; margin-top: 5px; }
        .unit { font-size: 0.5em; color: #00ff88; margin-left: 5px; }

        button { background: #00ff88; color: #0b0e11; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        canvas { max-width: 1100px; margin: 20px auto; background: #1c2128; border-radius: 12px; padding: 10px; }
    </style>
</head>
<body>

    <h1>Health Monitoring Hub</h1>
    
    <div class="panel">
        <button onclick="initSerial()">CONNECT RECEIVER</button>
        <span style="margin-left:20px;">Rename Label:</span>
        <input type="text" id="nameInput" class="settings-input" placeholder="e.g. Patient Alpha" oninput="updateLabel()">
    </div>

    <div class="section-header">
        <span id="unit1Label">UNIT 1 - WEARABLE NODE</span>
        <span style="font-size: 0.5em; color: #8b949e;">ID: 01</span>
    </div>
    <div class="dashboard">
        <div class="card"><div class="label">BPM</div><div id="u1_bpm" class="value">--</div></div>
        <div class="card"><div class="label">O2 %</div><div id="u1_spo2" class="value">--</div></div>
        <div class="card"><div class="label">Temp</div><div id="u1_temp" class="value">--</div></div>
        <div class="card"><div class="label">Signal</div><div id="u1_rssi" class="value">--</div></div>
    </div>

    <div class="section-header">
        <span>UNIT 2 - REMOTE NODE</span>
        <span style="font-size: 0.5em; color: #8b949e;">ID: 02</span>
    </div>
    <div class="dashboard">
        <div class="card"><div class="label">BPM</div><div id="u2_bpm" class="value">--</div></div>
        <div class="card"><div class="label">O2 %</div><div id="u2_spo2" class="value">--</div></div>
        <div class="card"><div class="label">Temp</div><div id="u2_temp" class="value">--</div></div>
        <div class="card"><div class="label">Signal</div><div id="u2_rssi" class="value">--</div></div>
    </div>

    <canvas id="liveChart"></canvas>

    <script>
        let chart;
        let u1History = [];

        function updateLabel() {
            const input = document.getElementById('nameInput').value;
            document.getElementById('unit1Label').innerText = input || "UNIT 1 - WEARABLE NODE";
        }

        async function initSerial() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                setupChart();
                const reader = port.readable.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    buffer += decoder.decode(value);
                    if (buffer.includes('\n')) {
                        let lines = buffer.split('\n');
                        buffer = lines.pop(); 
                        lines.forEach(line => {
                            try {
                                const json = JSON.parse(line);
                                updateDashboard(json);
                            } catch(e) {}
                        });
                    }
                }
            } catch (err) { console.log(err); }
        }

        function setupChart() {
            const ctx = document.getElementById('liveChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{ label: 'Unit 1 BPM', data: u1History, borderColor: '#00ff88', tension: 0.4 }]
                },
                options: { responsive: true, animation: false }
            });
        }

        function updateDashboard(json) {
            // Check if data is for Unit 1 or Unit 2 based on an "id" key
            const prefix = (json.id === 2) ? "u2_" : "u1_";
            
            if(json.bpm) document.getElementById(prefix + 'bpm').innerText = json.bpm;
            if(json.spo2) document.getElementById(prefix + 'spo2').innerText = json.spo2;
            if(json.temp) document.getElementById(prefix + 'temp').innerText = json.temp;
            if(json.rssi) document.getElementById(prefix + 'rssi').innerText = json.rssi;

            if(json.id !== 2 && json.bpm) {
                u1History.push(json.bpm);
                if (u1History.length > 20) u1History.shift();
                chart.update();
            }
        }
    </script>
</body>
</html>
