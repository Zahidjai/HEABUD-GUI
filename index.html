<!DOCTYPE html>
<html>
<head>
    <title>IEEE UPNM - Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: #e1e1e1; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00ff88; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .connection-bar { margin-bottom: 30px; background: #1c2128; padding: 15px; border-radius: 8px; display: inline-block; }
        
        /* Section Styling */
        .section-header { color: #00ff88; font-size: 1.5em; text-align: left; width: 90%; max-width: 1000px; margin: 20px auto 10px auto; border-bottom: 2px solid #30363d; padding-bottom: 5px; }
        
        .dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Data Card Styling */
        .card { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; padding: 20px; min-width: 200px; flex: 1; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #00ff88; }
        .label { font-size: 0.9em; color: #8b949e; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 2.5em; font-weight: bold; color: #ffffff; }
        .unit { font-size: 0.4em; color: #00ff88; margin-left: 5px; }

        button { background: #00ff88; color: #0b0e11; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1em; }
        button:hover { background: #00cc6e; }
        
        canvas { max-width: 1000px; margin-top: 30px; background: #1c2128; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body>

    <h1>Health Monitoring System</h1>
    
    <div class="connection-bar">
        <button onclick="initSerial()">CONNECT RECEIVER</button>
        <div id="status" style="margin-top:10px; font-size: 0.8em; color: #8b949e;">Status: Ready to Connect</div>
    </div>

    <div class="section-header">UNIT 1 - WEARABLE NODES</div>
    
    <div class="dashboard">
        <div class="card">
            <div class="label">Heart Rate</div>
            <div id="bpmValue" class="value">--<span class="unit">BPM</span></div>
        </div>
        
        <div class="card">
            <div class="label">Oxygen Saturation</div>
            <div id="spo2Value" class="value">--<span class="unit">% SpO2</span></div>
        </div>
        
        <div class="card">
            <div class="label">Body Temp</div>
            <div id="tempValue" class="value">--<span class="unit">°C</span></div>
        </div>

        <div class="card">
            <div class="label">Signal Strength</div>
            <div id="rssiValue" class="value">--<span class="unit">dBm</span></div>
        </div>
    </div>

    <canvas id="liveChart"></canvas>

    <script>
        let chart;
        let dataHistory = [];

        async function initSerial() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "Status: Connected to Unit 1";
                
                setupChart();
                const reader = port.readable.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    buffer += decoder.decode(value);
                    
                    if (buffer.includes('\n')) {
                        let lines = buffer.split('\n');
                        buffer = lines.pop(); 
                        
                        lines.forEach(line => {
                            try {
                                const json = JSON.parse(line);
                                updateDashboard(json);
                            } catch(e) { /* Skip messy lines */ }
                        });
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err;
            }
        }

        function setupChart() {
            const ctx = document.getElementById('liveChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(30).fill(''),
                    datasets: [{
                        label: 'Live Heart Rate (BPM)',
                        data: dataHistory,
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { 
                    responsive: true,
                    animation: false,
                    scales: { y: { min: 40, max: 180, grid: { color: '#30363d' } }, x: { display: false } }
                }
            });
        }

        function updateDashboard(json) {
            // Mapping JSON keys to HTML IDs
            if(json.bpm) document.getElementById('bpmValue').innerHTML = json.bpm + '<span class="unit">BPM</span>';
            if(json.spo2) document.getElementById('spo2Value').innerHTML = json.spo2 + '<span class="unit">% SpO2</span>';
            if(json.temp) document.getElementById('tempValue').innerHTML = json.temp + '<span class="unit">°C</span>';
            if(json.rssi) document.getElementById('rssiValue').innerHTML = json.rssi + '<span class="unit">dBm</span>';

            // Update Chart
            if(json.bpm) {
                dataHistory.push(json.bpm);
                if (dataHistory.length > 30) dataHistory.shift();
                chart.update();
            }
        }
    </script>
</body>
</html>
