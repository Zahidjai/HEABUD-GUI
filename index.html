<!DOCTYPE html>
<html>
<head>
    <title>HEABUD - Emergency Response Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #0b0e11; --card-bg: #1c2128; --accent: #00ff88;
            --border: #30363d; --text-main: #e1e1e1; --text-dim: #8b949e;
            --danger: #ff4d4d; --warning: #ffcc00;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; overflow-x: hidden; }
        
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); position: sticky; top: 0; z-index: 10; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .settings-btn { font-size: 24px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .settings-btn:hover { color: var(--accent); transform: rotate(45deg); }

        /* Sidebar */
        #sidebar { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--card-bg); border-left: 1px solid var(--border); transition: 0.3s; padding: 25px; z-index: 100; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #sidebar.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Settings Elements */
        .setting-item { margin-bottom: 25px; padding: 15px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border); }
        input { background: #1c2128; color: white; border: 1px solid var(--border); padding: 8px; width: 80%; border-radius: 4px; }

        /* Main Dashboard */
        .main-content { padding: 40px; }
        .node-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        
        /* ALARM STATES */
        .unit-card { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); padding: 20px; transition: 0.3s; position: relative; }
        .status-yellow { border: 3px solid var(--warning) !important; background: rgba(255, 204, 0, 0.05); }
        .status-red { border: 3px solid var(--danger) !important; background: rgba(255, 77, 77, 0.1); animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .rescue-text { color: var(--accent); font-weight: bold; font-size: 0.8em; margin-bottom: 5px; display: none; }
        
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .metric { background: var(--bg-color); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .metric.alert-red { background: var(--danger) !important; color: white; }
        
        .val { font-size: 1.8em; font-weight: bold; }
        .lab { font-size: 0.6em; color: var(--text-dim); text-transform: uppercase; }

        /* Emergency Popup */
        #emergencyPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--danger); color: white; padding: 40px; border-radius: 20px; z-index: 1000; text-align: center; box-shadow: 0 0 100px rgba(255,0,0,0.5); width: 300px; }
        
        button { background: var(--accent); color: var(--bg-color); border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-assist { background: white; color: var(--danger); margin-top: 20px; width: 100%; font-size: 1.2em; }

        .chart-container { margin-top: 40px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <div class="logo-group">
            <i class="ph ph-heartbeat" style="color: var(--accent); font-size: 28px;"></i>
            <h1>HEABUD HUB <span style="font-size: 0.5em; color: var(--text-dim);">EMERGENCY MODE</span></h1>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button onclick="initSerial()">CONNECT RECEIVER</button>
            <i class="ph ph-gear settings-btn" onclick="toggleSidebar()"></i>
        </div>
    </header>

    <div id="emergencyPopup">
        <h2 id="popupMsg">UNIT X IN DANGER!</h2>
        <i class="ph ph-warning" style="font-size: 50px;"></i>
        <button class="btn-assist" onclick="handleAssist()">ASSIST</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header"><h3>Configuration</h3><i class="ph ph-x" style="cursor:pointer" onclick="toggleSidebar()"></i></div>
        <div id="unitSettingsList"></div>
        <button style="width:100%" onclick="addNewUnit()">+ ADD NEW UNIT</button>
    </div>

    <div class="main-content">
        <div id="nodeGrid" class="node-grid"></div>
        <div class="chart-container">
            <h4 id="graphTitle" style="color: var(--accent); margin-top: 0;">SELECT A UNIT TO GRAPH</h4>
            <canvas id="healthChart" height="100"></canvas>
        </div>
    </div>

    <script>
        let units = [{ id: 1, name: "Unit 1", bpm: 0, spo2: 0, temp: 0, rssi: 0, history: [], assisted: false }];
        let chart; let activeGraphId = 1;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let beepInterval;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function checkAlarms(u) {
            let badCount = 0;
            const alerts = { bpm: false, spo2: false, temp: false };

            if (u.bpm > 0 && (u.bpm < 60 || u.bpm > 100)) { alerts.bpm = true; badCount++; }
            if (u.spo2 > 0 && u.spo2 < 95) { alerts.spo2 = true; badCount++; }
            if (u.temp > 0 && (u.temp < 36.1 || u.temp > 37.2)) { alerts.temp = true; badCount++; }

            return { badCount, alerts };
        }

        function renderUI() {
            const grid = document.getElementById('nodeGrid');
            const settingsList = document.getElementById('unitSettingsList');
            grid.innerHTML = ""; settingsList.innerHTML = "";

            units.forEach(u => {
                const { badCount, alerts } = checkAlarms(u);
                let cardClass = "unit-card";
                if (badCount === 1) cardClass += " status-yellow";
                if (badCount >= 2) cardClass += " status-red";

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div id="rescue_${u.id}" class="rescue-text" style="display:${u.assisted ? 'block' : 'none'}">SIGNAL TO THE RESCUE TEAM SENT</div>
                    <div style="display:flex; justify-content:space-between">
                        <strong style="color:var(--accent)">${u.name}</strong>
                        <span style="font-size:0.7em; color:var(--text-dim)">ID: 0${u.id}</span>
                    </div>
                    <div class="metric-grid">
                        <div class="metric ${alerts.bpm ? 'alert-red' : ''}" onclick="setActiveGraph(${u.id})">
                            <div class="lab">Heart Rate</div><div class="val">${u.bpm || '--'}</div>
                        </div>
                        <div class="metric ${alerts.spo2 ? 'alert-red' : ''}">
                            <div class="lab">Oxygen %</div><div class="val">${u.spo2 || '--'}</div>
                        </div>
                        <div class="metric ${alerts.temp ? 'alert-red' : ''}">
                            <div class="lab">Temp °C</div><div class="val">${u.temp || '--'}</div>
                        </div>
                        <div class="metric">
                            <div class="lab">Signal dBm</div><div class="val">${u.rssi || '--'}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

                // Settings
                const setItem = document.createElement('div');
                setItem.className = "setting-item";
                setItem.innerHTML = `
                    <h4>Unit ID: 0${u.id}</h4>
                    <input type="text" value="${u.name}" onchange="renameUnit(${u.id}, this.value)">
                    <button style="margin-top:10px" onclick="exportData(${u.id}, 'csv')">Export CSV</button>
                    <span style="color:var(--danger); cursor:pointer; font-size:0.8em; display:block; margin-top:10px" onclick="removeUnit(${u.id})">Remove Unit</span>
                `;
                settingsList.appendChild(setItem);

                // Triple Alarm Action
                if (badCount >= 3 && !u.assisted) { triggerEmergency(u); }
            });
        }

        function triggerEmergency(u) {
            document.getElementById('popupMsg').innerText = `${u.name.toUpperCase()} IN DANGER!`;
            document.getElementById('emergencyPopup').style.display = "block";
            if (!beepInterval) beepInterval = setInterval(playBeep, 500);
        }

        function playBeep() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 880; osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function handleAssist() {
            clearInterval(beepInterval); beepInterval = null;
            document.getElementById('emergencyPopup').style.display = "none";
            units.forEach(u => {
                const { badCount } = checkAlarms(u);
                if (badCount >= 3) { u.assisted = true; }
            });
            renderUI();
        }

        // Standard Functions (Renaming, Adding, Removing, Serial) Kept from Previous Version...
        function renameUnit(id, name) { const u = units.find(x => x.id === id); if(u) u.name = name; renderUI(); }
        function removeUnit(id) { units = units.filter(x => x.id !== id); renderUI(); }
        function addNewUnit() { units.push({ id: units.length+1, name: "New Unit", bpm:0, spo2:0, temp:0, rssi:0, history:[], assisted:false }); renderUI(); }
        function setActiveGraph(id) { activeGraphId = id; renderUI(); updateChart(); }

        async function initSerial() {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            setupChart();
            const reader = port.readable.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            while (true) {
                const { value, done } = await reader.read();
                buffer += decoder.decode(value);
                if (buffer.includes('\n')) {
                    let lines = buffer.split('\n'); buffer = lines.pop(); 
                    lines.forEach(line => {
                        try {
                            const json = JSON.parse(line);
                            const unit = units.find(u => u.id === json.id);
                            if(unit) {
                                unit.bpm = json.bpm; unit.spo2 = json.spo2; unit.temp = json.temp; unit.rssi = json.rssi;
                                unit.history.push(json.bpm); if(unit.history.length > 30) unit.history.shift();
                            }
                            renderUI();
                        } catch(e) {}
                    });
                }
            }
        }

        function setupChart() {
            const ctx = document.getElementById('healthChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(30).fill(''), datasets: [{ label: 'Heart Rate', data: [], borderColor: '#00ff88', tension: 0.4 }] },
                options: { animation: false }
            });
        }

        function updateChart() {
            const u = units.find(x => x.id === activeGraphId);
            if(chart && u) { chart.data.datasets[0].data = u.history; chart.update(); }
        }

        renderUI();
    </script>
</body>
</html>
