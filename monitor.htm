<!DOCTYPE html>
<html>
<head>
    <title>IEEE UPNM Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #00ff88; text-align: center; }
        .container { display: flex; flex-direction: column; align-items: center; }
        canvas { max-width: 800px; background: #1a1a1a; border-radius: 10px; padding: 10px; }
        .stat-box { font-size: 3em; margin: 20px; border: 2px solid #00ff88; padding: 20px; border-radius: 15px; min-width: 250px; }
        button { background: #00ff88; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>LORA REMOTE HEALTH STATION</h1>
    <button onclick="initSerial()">START MONITORING</button>
    
    <div class="container">
        <div class="stat-box" id="bpmDisplay">-- BPM</div>
        <canvas id="heartChart"></canvas>
    </div>

    <script>
        let chart;
        const dataPoints = [];

        async function initSerial() {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            setupChart();
            
            const reader = port.readable.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                buffer += decoder.decode(value);
                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    lines.forEach(line => {
                        try {
                            const json = JSON.parse(line);
                            updateUI(json.data, json.rssi);
                        } catch(e) {}
                    });
                }
            }
        }

        function setupChart() {
            const ctx = document.getElementById('heartChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(50).fill(''),
                    datasets: [{ label: 'Heart Rate History', data: dataPoints, borderColor: '#00ff88', tension: 0.4 }]
                },
                options: { animation: false, scales: { y: { min: 40, max: 180 } } }
            });
        }

        function updateUI(bpm, rssi) {
            document.getElementById('bpmDisplay').innerText = bpm + " BPM";
            dataPoints.push(bpm);
            if (dataPoints.length > 50) dataPoints.shift();
            chart.update();
        }
    </script>
</body>
</html>
